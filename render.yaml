# Render static site for the IFA Bacs Commission web app.
# https://render.com/docs/blueprint-spec
staticSites:
  - name: ifa-bacs-commission
    # Render runs `pnpm install` before buildCommand; `build` targets the web app only.
    buildCommand: pnpm run build
    staticPublishPath: artifacts/ifa-bacs-commission/dist/public
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
